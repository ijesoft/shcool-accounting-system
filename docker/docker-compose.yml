services:
  db:
    image: postgres:16-alpine
    ports:
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=school_accounting
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - school-net

  migrate:
    build:
      context: ..
      dockerfile: docker/Dockerfile.migrate
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/school_accounting?schema=public
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - school-net

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-postgres}@db:5432/school_accounting?schema=public
      - SESSION_SECRET=${SESSION_SECRET:-school-accounting-secret-key-32chars}
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_NAME=School Accounting System
      - NEXT_PUBLIC_APP_URL=http://localhost:3002
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - school-net

networks:
  school-net:
    driver: bridge

volumes:
  pgdata:
